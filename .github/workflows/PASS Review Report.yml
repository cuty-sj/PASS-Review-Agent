name: PASS Review Report

on:
  schedule:
    # 월요일 오전8시(KST)
    - cron: '0 23 * * 0'

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install -r requirements.txt

    - name: Run Python
      env:
        BOT_TOKEN: ${{ secrets.REVIEW_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.REVIEW_CHAT_ID }}

      run: python PASS_Android_Appreview.py
